name: Warhammer 40K Article Notifier

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour (UTC)
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Run the checker (no dependencies — pure stdlib Python)
      - name: Check feed and post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_feed.py

      # 3. Commit updated seen_articles.json back to the repo
      #    This ensures the file persists between runs
      - name: Commit updated seen articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json || true
          git diff --cached --quiet || git commit -m "chore: update seen articles [skip ci]"
          git push || true
