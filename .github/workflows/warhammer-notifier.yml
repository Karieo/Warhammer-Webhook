name: Warhammer 40K Article Notifier

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour (UTC)
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Restore the seen-articles cache so we don't re-post old articles
      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ runner.os }}
          restore-keys: seen-articles-

      # 3. Run the checker (no dependencies — pure stdlib Python)
      - name: Check feed and post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_feed.py

      # 4. Commit updated seen_articles.json back to the repo
      #    so the cache is always fresh even after a cache miss
      - name: Commit updated seen articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json || true
          git diff --cached --quiet || git commit -m "chore: update seen articles [skip ci]"
          git push || true
