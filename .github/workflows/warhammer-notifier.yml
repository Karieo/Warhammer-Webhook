name: Warhammer 40K Article Notifier

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour (UTC)
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI
  repository_dispatch:      # allows external webhooks/services to trigger the workflow
    types: [check-feed]

concurrency:
  group: check-feed
  cancel-in-progress: false

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Check out your repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Run the checker (no dependencies — pure stdlib Python)
      - name: Check feed and post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_feed.py

      # 3. Commit and push updated seen_articles.json
      #    This ensures the file persists between runs
      - name: Commit and push updated seen articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json failed_articles.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update seen articles [skip ci]"
            git push origin main || (
              echo "Push failed, retrying after rebase..." &&
              git fetch origin main &&
              git rebase origin/main &&
              git push origin main
            )
          fi
